<v-dialog v-model="advSearchExpand" class="w-sm-100 w-md-75">

    <v-card class="rounded-0 overflow-hidden">
        <v-toolbar
            color="primary"
            class="card-header"
        >
            <div class="w-sm-33 ml-4 d-none d-sm-flex">
                <v-toolbar-title>
                    {{ _('Advanced Search') }}
                </v-toolbar-title>
            </div>

            <v-select ref="savedSearchDropdown"
                      small
                      :label="translations.loadExistingSearch_"
                      :items="searches"
                      item-title="name"
                      item-value="id"
                      return-object
                      @click="loadSearchesFromAPI"
                      @click:clear="resetQuery"
                        class="w-sm-33 flex-grow-1 mx-4"
                        variant="solo"
                        density="comfortable"
                        hide-details="auto"
                      clearable
                      v-model="savedSearchSelection"
            >
                <template v-slot:item="{ props, item }">
                    <v-list-item :subtitle="countSavedSearchFilters(item.raw.data) ? translations.activeFiltersCount_(countSavedSearchFilters(item.raw.data)) : ''" v-bind="props" @click="loadSearch(item.raw)">
                        <template #append>
                            <v-icon
                                color="warning"
                                @click.stop="deleteSearch(item.raw.id)">mdi-delete
                            </v-icon>
                        </template>
                    </v-list-item>
                </template>
            </v-select>

            <div class="w-sm-33 mr-4 d-flex">
                <v-spacer></v-spacer>
                <v-btn icon="mdi-close" variant="text" @click="advSearchExpand=false"></v-btn>
            </div>

        </v-toolbar>

        <v-card-text class="overflow-y-auto" style="height: calc(100vh - 187px);">
            <incident-search-box
                    @close="advSearchExpand=false"
                    close-btn="true"
                    v-model="search"
                    @search="doSearch"
                    :users="users"
                    :roles="allowedRoles"
                    :is-admin="has_role(currentUser,'Admin')"

            ></incident-search-box>
        </v-card-text>

    </v-card>

    <v-card class="text-center rounded-0 sticky-bottom-bar">
        <v-divider></v-divider>

        <v-card-actions class="pa-4 ga-2">
            <v-spacer></v-spacer>
            <v-btn @click="search={}" text>{{ _('Clear Search') }}</v-btn>
            <v-btn v-if="!savedSearchSelection" @click="saveQueryDialog=true" color="grey"
                   depressed>{{ _('Save Search') }}</v-btn>
             <v-btn
                v-if="savedSearchSelection"
                @click="updateSearch"
                color="warning"
                depressed
            >{{ _('Update Search') }}</v-btn>
            <v-btn
                v-if="savedSearchSelection"
                @click="openSaveQueryDialog"
                color="warning"
                depressed
            >{{ _('Save As New') }}</v-btn>
            <v-btn @click="doSearch" color="primary" variant="elevated">{{ _('Search') }}</v-btn>
        </v-card-actions>
    </v-card>


    <v-dialog width="300" v-model="saveQueryDialog">
        <v-card class="pa-3">
                <v-card-text>
                        <v-text-field
                                ref="saveQueryInput"
                                v-model="queryName"
                                @keydown.enter="saveSearch"
                                label="{{ _('Name this search') }}"

                        ></v-text-field>
                </v-card-text>
                <v-card-actions>
                    <v-spacer></v-spacer>
                    <v-btn @click="saveQueryDialog=false" text>{{ _('Cancel') }}</v-btn>
                    <v-btn @click="saveSearch" color="primary" >{{ _('Save') }}</v-btn>
                </v-card-actions>
        </v-card>
    </v-dialog>
</v-dialog>
